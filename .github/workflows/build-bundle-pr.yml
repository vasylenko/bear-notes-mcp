name: Build .mcpb bundle for PR

on:
  pull_request:
    branches: [main]

concurrency:
  group: build-bundle-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      CI: 'true'
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install Task
        uses: arduino/setup-task@v2

      - name: Install dependencies
        run: npm ci

      # Compute a strictly-monotonic build version so Claude Desktop's installer
      # always shows the "Update" affordance for each successive PR push. Scheme:
      #   <base>-pr.<PR>.<run_number>
      # github.run_number is workflow-global monotonic, so successive pushes to
      # the same PR are always strictly newer per SemVer's prerelease ordering.
      - name: Compute build version
        id: version
        run: |
          set -euo pipefail
          BASE=$(jq -r .version manifest.json)
          CORE="${BASE%%-*}"
          BV="${CORE}-pr.${{ github.event.pull_request.number }}.${{ github.run_number }}"
          echo "build_version=${BV}" >> "$GITHUB_OUTPUT"
          echo "Build version: ${BV}"

      # Stamp the computed version into manifest.json, package.json, src/config.ts
      # and regenerate the lockfile. Delegates to `task version` (Taskfile.yml)
      # so the version-bearing-files list lives in exactly one place.
      - name: Stamp build version
        run: task version VERSION="${{ steps.version.outputs.build_version }}" -y

      - name: Create bundle
        run: task pack

      - name: Compute short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Upload bundle artifact
        id: upload
        uses: actions/upload-artifact@v7
        with:
          name: mcpb-bundle-pr-${{ github.event.pull_request.number }}-${{ steps.vars.outputs.sha_short }}
          path: bear-notes-mcpb-*.mcpb
          retention-days: 14
          if-no-files-found: error

      # Post (or update on subsequent pushes) a single sticky comment on the PR
      # so reviewers don't have to dig into the Actions tab to grab the .mcpb.
      # Identity is anchored by an HTML-comment marker (invisible in rendered
      # Markdown) rather than `gh pr comment --edit-last`, which would be
      # fragile if any other workflow ever comments on PRs as github-actions[bot].
      # All dynamic values flow in via `env:` to keep ${{ ... }} out of the shell
      # body (script-injection class).
      - name: Post or update PR build comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          ARTIFACT_URL: ${{ steps.upload.outputs.artifact-url }}
          BUILD_VERSION: ${{ steps.version.outputs.build_version }}
          SHA: ${{ steps.vars.outputs.sha_short }}
          MARKER: '<!-- mcpb-pr-build -->'
        run: |
          set -euo pipefail

          BODY_FILE="${RUNNER_TEMP}/mcpb-pr-body.md"
          cat >"${BODY_FILE}" <<EOF
          ${MARKER}
          **MCPB build for this PR**

          | Field   | Value |
          |---------|-------|
          | Bundle  | [Download .mcpb](${ARTIFACT_URL}) |
          | Version | \`${BUILD_VERSION}\` |
          | Commit  | \`${SHA}\` |
          | Run     | [#${RUN_ID}](https://github.com/${REPO}/actions/runs/${RUN_ID}) |

          _Artifact retained 14 days. This comment auto-updates on each push._
          EOF

          COMMENT_ID=$(gh api "repos/${REPO}/issues/${PR}/comments" --paginate \
            --jq ".[] | select(.body | startswith(\"${MARKER}\")) | .id" \
            | head -n1)

          if [ -n "${COMMENT_ID}" ]; then
            gh api -X PATCH "repos/${REPO}/issues/comments/${COMMENT_ID}" \
              -F body=@"${BODY_FILE}" >/dev/null
            echo "Updated existing comment ${COMMENT_ID} on PR #${PR}"
          else
            NEW_ID=$(gh api -X POST "repos/${REPO}/issues/${PR}/comments" \
              -F body=@"${BODY_FILE}" --jq '.id')
            echo "Posted new comment ${NEW_ID} on PR #${PR}"
          fi
