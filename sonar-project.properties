sonar.projectKey=vasylenko_bear-notes-mcp
sonar.organization=vasylenko

# Test fixtures are intentionally-shaped input data, not deliverables.
# Excluding so Sonar's HTML/JS rules (DoctypePresenceCheck, S5254, PageWithoutTitleCheck)
# don't flag them as bugs and pull the Reliability rating below A on PRs that touch them.
sonar.exclusions=tests/fixtures/**
sonar.test.exclusions=tests/fixtures/**
