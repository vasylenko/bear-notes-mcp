# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: 'bear-notes-mcp A/B — v3.0.0 FTS5 vs Bear native MCP'
# Distinct outputPath from evals/fts5-vs-like.yaml so the two evals can run
# sequentially without clobbering each other's results.
outputPath: outputs/results-native.json

# 15 repeats matches fts5-vs-like.yaml — n=15 is the threshold where
# every prompt's tool-call delta crosses statistical significance. 4 prompts
# × 15 repeats × 2 providers = 120 agent runs (~$13, ~15 min wall clock at
# default 4-way concurrency).
evaluateOptions:
  repeat: 15

# Single templated prompt — each test fills `prompt` via vars, so per-test
# assertions can target prompt-specific ground truth.
prompts:
  - '{{prompt}}'

# Provider isolation matches fts5-vs-like.yaml — see that file for
# the full rationale on setting_sources / custom_allowed_tools / persist_session.
#
# What this comparison measures:
#   - "v3.0.0"    — our FTS5/BM25 backend with a natural-language-only tool
#                   surface, whole-word tokenization, snippet brackets per
#                   result, OCR-by-default. Structured params for tag, pinned,
#                   date filters; no operator vocabulary on user-facing surfaces.
#   - "bear-native" — Bear's own MCP server (`bearcli mcp-server`) exposing
#                     Bear's search syntax: substring matching, recency-flavor
#                     ordering (pinned,modified by default), rich operators
#                     (#tag, !#tag, #*/sub, @title, @ocr, @todo, @done,
#                     @date(...), @today, "exact phrase", -negation, OR).
#                     See `bearcli help search` for the full vocabulary.
#
# Both providers read the same Bear database in place — only the search shape
# differs. bearcli ships with Bear.app; the absolute path below assumes the
# default /Applications install (no custom override needed for the typical setup).
#
# Native MCP requires Bear.app to be installed (the bearcli binary lives inside
# the .app bundle) but does NOT require Bear to be running — it reads the
# SQLite database directly, same as our server.
providers:
  - id: anthropic:claude-agent-sdk
    label: bear-native
    config:
      model: claude-sonnet-4-6
      working_dir: ..
      persist_session: false
      setting_sources: []
      env:
        CLAUDE_CONFIG_DIR: /tmp/bear-mcp-eval-claude-config
      custom_allowed_tools: ['mcp__bear-native__*']
      debug: true
      debug_file: ./outputs/sdk-bear-native.log
      mcp:
        servers:
          - name: bear-native
            command: /Applications/Bear.app/Contents/MacOS/bearcli
            args: [mcp-server]

  - id: anthropic:claude-agent-sdk
    label: v3.0.0
    config:
      model: claude-sonnet-4-6
      working_dir: ..
      persist_session: false
      setting_sources: []
      env:
        CLAUDE_CONFIG_DIR: /tmp/bear-mcp-eval-claude-config
      custom_allowed_tools: ['mcp__v3-0-0__*']
      debug: true
      debug_file: ./outputs/sdk-v3-0-0.log
      mcp:
        servers:
          - name: v3-0-0
            command: node
            args: [dist/main.js]

# Default toolCalls + turns metrics from shared/default-test.yaml.
defaultTest: file://shared/default-test.yaml

# Same four prompts as fts5-vs-like.yaml so cross-eval comparison stays
# apples-to-apples — Quality scores from this run can be placed alongside the
# v3.0.0 column from the FTS5-vs-LIKE eval to triangulate where each backend
# wins or loses on the same probe.
#
# Two design rules carry over (validated the hard way during the FTS5 eval):
#   1. The prompt must explicitly direct search ("Search my Bear notes…").
#      Natural-question framing triggers the Agent SDK's memory-first
#      orientation and the agent never calls the MCP tools — measuring
#      agent routing, not search engine quality.
#   2. Probe queries a real user would naturally ask. Synthetic capability
#      tests (boolean operators, exact-phrase quoting, prefix wildcards)
#      belong in src/infra/fts-index.test.ts, not in paid LLM evals.
tests:
  - description: 'Verbatim quote from a known recent note'
    vars:
      prompt: |
        Search my Bear notes — I'm prepping for a 1:1 with a senior engineer
        who keeps over-engineering everything, looking for complexity even
        when there isn't any. I read something a while back with concrete
        coaching tactics for that exact situation. What were the suggested
        moves?
    assert:
      - type: icontains-any
        value:
          - 'highly scalable app'
          - 'look for complexity when there is none'
          - 'decision records'
          - 'artificial constraints'
          - 'customer value'
        metric: Quality

  - description: 'Specific saved prompt discoverable among many similar'
    vars:
      prompt: |
        Search my Bear notes — I'm doing a final editing pass on a blog
        draft and I want to use the prompt I built specifically for
        catching verbose, padded writing — sentences that drag, repeated
        explanations, that kind of bloat. Can you find that prompt and
        tell me what patterns it actually checks for?
    assert:
      - type: icontains-any
        value:
          - 'graphomania'
          - 'verbose introductions'
          - 'redundant conclusions'
          - 'filler transitions'
          - 'unnecessary context padding'
        metric: Quality

  - description: 'Find a lesson when query words differ from note words'
    vars:
      prompt: |
        Search my Bear notes — there's an article I bookmarked about how
        engineering leadership work changes when you move past mostly
        coordinating execution and start steering direction yourself. The
        author laid out a short list of activities that define that kind
        of role. What was the framework, and what was the source?
    assert:
      - type: icontains-any
        value:
          - 'core loop'
          - 'leadership-heavy'
          - 'four steps'
          - 'orchestration-heavy'
          - 'lethain'
        metric: Quality

  - description: 'Synthesis across multiple related notes'
    vars:
      prompt: |
        Search my Bear notes — what blog drafts have I sketched around
        using AI in real engineering work? I want to see the rough list
        and the angle each one is taking — I'm trying to figure out which
        to develop next.
    assert:
      - type: javascript
        value: |
          const out = (output || '').toLowerCase();
          const categories = [
            { name: 'incident/failure narrative', phrases: ['external secrets', 'helm chart', 'qa cluster', 'broke production', 'security patch'] },
            { name: 'structured workflow / migration methodology', phrases: ['same action, different context', 'parallel ai sessions', 'clauderne', 'workflow decomposition', 'mutation boundaries'] },
            { name: 'daily Claude coding practice', phrases: ['atomic steps', 'incremental atomic', 'high-level objective', 'decomposed', 'course-correct'] },
            { name: 'plugin/skills design lessons', phrases: ['arc plugin', 'gsd', 'plannotator', 'exitplanmode', 'simple skills'] },
          ];
          const hit = categories.filter(c => c.phrases.some(p => out.includes(p)));
          const MIN = 2;
          return {
            pass: hit.length >= MIN,
            score: hit.length >= MIN ? 1 : 0,
            reason: `Matched ${hit.length} of ${categories.length} content categories (need >= ${MIN}): [${hit.map(c => c.name).join(', ')}]`,
            namedScores: { Quality: hit.length >= MIN ? 1 : 0 },
          };
        metric: Quality
