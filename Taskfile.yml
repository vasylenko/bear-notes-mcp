version: '3'

vars:
  BUNDLE_NAME: bear-notes-mcpb-{{now | date "20060102"}}.mcpb
  
tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list
  
  inspector:
    desc: Run MCP inspector with Web UI
    cmds:
      - npx @modelcontextprotocol/inspector node dist/main.js
      
  setup:
    desc: Project setup (install + build)
    cmds:
      - npm install
      - npm run build 

  style:
    desc: Runs linter and formatter with fixes
    cmds:
      - npm run lint
      - npm run format
  
  clean:
    desc: Clean build artifacts
    cmds:
      - rm -rf dist tmp *.mcpb
      
  build:
    desc: Build with quality checks
    deps: [clean]
    cmds:
      - npm run check
      - npm run test
      - npm run build
      
  test:system:
    if: '{{ ne .CI "true" }}' # Skip in CI as there is no system test environment set up yet
    desc: Run system tests with MCP Inspector CLI
    cmds:
      - npm run test:system


  # === Evals ===

  eval:
    desc: Run A/B eval and generate HTML report
    interactive: true
    preconditions:
      - sh: test -n "$ANTHROPIC_API_KEY"
        msg: "ANTHROPIC_API_KEY must be exported"
      - sh: test -f dist/main.js
        msg: "Run 'task build' first — release-candidate provider needs dist/main.js"
      - sh: test -f evals/released/dist/main.js
        msg: "Run 'task eval:setup' first — baseline provider needs evals/released/dist/main.js"
    cmds:
      # Recreate isolated CLAUDE_CONFIG_DIR each run so prior eval state
      # (memories, transient SDK files) can't leak into this run.
      - rm -rf /tmp/bear-mcp-eval-claude-config
      - mkdir -p /tmp/bear-mcp-eval-claude-config
      - rm -f evals/outputs/sdk-*.log
      - npx promptfoo eval --config evals/promptfooconfig.yaml --no-cache {{.CLI_ARGS}}
      - node evals/generate-report.js
      - open evals/outputs/report.html

  eval:fts5:
    desc: Run SVA-28 FTS5 search A/B eval and generate HTML report
    interactive: true
    preconditions:
      - sh: test -n "$ANTHROPIC_API_KEY"
        msg: "ANTHROPIC_API_KEY must be exported"
      - sh: test -f dist/main.js
        msg: "Run 'task build' first — HEAD-FTS5 provider needs dist/main.js"
      - sh: test -f evals/released/dist/main.js
        msg: "Run 'task eval:setup VERSION=2.11.0' first — baseline provider needs evals/released/dist/main.js"
    cmds:
      - rm -rf /tmp/bear-mcp-eval-claude-config
      - mkdir -p /tmp/bear-mcp-eval-claude-config
      - rm -f evals/outputs/sdk-*.log
      - npx promptfoo eval --config evals/fts5-promptfooconfig.yaml --no-cache {{.CLI_ARGS}}
      - node evals/generate-report.js
      - open evals/outputs/report.html

  eval:setup:
    desc: "Download released baseline server (usage: task eval:setup VERSION=2.10.0)"
    requires:
      vars:
        - VERSION
    cmds:
      - rm -rf evals/released && mkdir -p evals/released
      - cd evals && npm pack bear-notes-mcp@{{.VERSION}}
      - tar xzf evals/bear-notes-mcp-{{.VERSION}}.tgz -C evals/released --strip-components=1
      - rm evals/bear-notes-mcp-{{.VERSION}}.tgz

  eval:report:
    desc: Regenerate HTML report from existing results
    cmds:
      - node evals/generate-report.js
      - open evals/outputs/report.html

  # === Website ===

  website:dev:
    desc: Start website dev server (network-accessible)
    cmds:
      - cd website && npx astro dev --host

  website:stop:
    desc: Stop website dev server
    cmds:
      - lsof -ti:4321 | xargs kill -9 2>/dev/null && echo "Stopped" || echo "Not running"

  # === Bundle Build ===

  pack:
    desc: Create production bundle
    # deps: [build, test:system]
    cmds:
      - task: build      
      - task: test:system # In CI, when skipped, this will be considered as success run
      - rm -rf tmp/bundle && mkdir -p tmp/bundle
      # `cp -R dist/. tmp/bundle/` copies the contents of dist/ (including the
      # tools/, operations/, infra/ subdirectories produced by the layered
      # src/ tree) into tmp/bundle/. The trailing `/.` matters: without it,
      # we'd get tmp/bundle/dist/ and manifest.json's entry_point="main.js"
      # would fail to resolve.
      - cp -R dist/. tmp/bundle/
      - cp -r assets/* manifest.json package.json tmp/bundle/
      - cd tmp/bundle && npx mcpb validate manifest.json
      - cd tmp/bundle && npm install --omit=dev    
      - npx mcpb pack tmp/bundle {{.BUNDLE_NAME}}
      - echo "Bundle created {{.BUNDLE_NAME}}"   
    
  info:
    desc: Show bundle info
    cmds:
      - npx mcpb info {{.BUNDLE_NAME}}
  
  docs:sync:
    desc: Sync tools list from manifest.json into README.md and docs/user/NPM.md
    cmds:
      - node scripts/sync-tools-to-docs.mjs
  
  version:
    desc: Update version across all files
    interactive: true
    requires:
      vars: 
        - VERSION
    prompt: "Confirm version update to {{.VERSION}}?"
    preconditions:
      - sh: echo "{{.VERSION}}" | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$'
        msg: "VERSION must follow semver format (x.y.z)"
    cmds:
      - |
        echo "Updating version to {{.VERSION}}"
        
        sed -i '' 's/"version": "[^"]*"/"version": "{{.VERSION}}"/' package.json
        
        sed -i '' 's/"version": "[^"]*"/"version": "{{.VERSION}}"/' manifest.json
        
        sed -i '' "s/export const APP_VERSION = '[^']*'/export const APP_VERSION = '{{.VERSION}}'/" src/config.ts
        
        echo "Version updated to {{.VERSION}} in package.json, manifest.json, and src/config.ts"
      - npm install --package-lock-only

  prepare-release:
    desc: Prepare release by updating version and docs
    cmds:
      - task: docs:sync
      - task: version
  
  push-release:
    desc: Commit, tag, and push a release
    requires:
      vars:
        - VERSION
        - SHORT_DESCRIPTION
    preconditions:
      - sh: test "$(git branch --show-current)" = "main"
        msg: Must be on main branch
      - sh: test -z "$(git status --porcelain)"
        msg: Working tree must be clean
    prompt: "Release v{{.VERSION}} ({{.SHORT_DESCRIPTION}})?"
    cmds:
      - |
        git commit --allow-empty -m "release: {{.VERSION}} - {{.SHORT_DESCRIPTION}}"
        git tag -a "v{{.VERSION}}" -m "release: {{.VERSION}}"
        git push --follow-tags
  
  changelog:
    silent: true
    desc: Extract changelog for specific version
    vars:
      VERSION: '{{.VERSION | default "1.0.0"}}'
    cmds:
      - |
        if [ ! -f CHANGELOG.md ]; then
          echo "CHANGELOG.md not found"
          exit 1
        fi
        
        # Extract content between ## [VERSION] and next ## section
        sed -n "/^## \[{{.VERSION}}\]/,/^## \[/p" CHANGELOG.md | \
        sed '$d' | \
        tail -n +3 | \
        sed '/^$/d'

