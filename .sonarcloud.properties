# Test fixtures are intentionally-shaped inputs, not deliverables.
# inspector.ts is the system-test harness — its `spawnSync('npx', ...)` calls
# trip S4036 (PATH-substitution risk), but the harness only runs in dev/CI
# where that attack vector is out of scope. We use file-level exclusion
# because SonarCloud Automatic Analysis does not honor
# `sonar.issue.ignore.multicriteria` in this file (UI-only per the docs).
sonar.exclusions=tests/fixtures/**,tests/system/inspector.ts
sonar.test.exclusions=tests/fixtures/**,tests/system/inspector.ts

# System tests share the canonical vitest file shape — imports, TEST_PREFIX
# and RUN_ID and PAUSE_AFTER_WRITE_OP constants, afterAll cleanup, opening
# describe. CPD flags this repetition across files; extracting a shared
# header helper would force indirection on what is the standard form of a
# vitest spec. Production sources stay on the 3% gate; only system specs
# are excluded.
sonar.cpd.exclusions=tests/system/*.test.ts
